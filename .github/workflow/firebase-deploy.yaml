name: CI/CD Firebase + GCP

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}

    steps:
      # 1. Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # 2. Set up Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run linting
      - name: Run Linter
        run: npm run lint

      # 5. Run tests
      - name: Run Tests
        run: npm test

      # 6. Build the frontend
      - name: Build Project
        run: npm run build

      # 7. Authenticate with Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 8. Set up gcloud CLI
      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          export_default_credentials: true

      # 9. Deploy frontend to Cloud Run
      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy ${{ secrets.GCP_CLOUD_RUN_SERVICE }} \
            --source=. \
            --region=${{ secrets.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated

      # 10. Install Firebase CLI
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      # 11. Deploy Firebase Functions, Firestore, Storage, Auth
      - name: Deploy Firebase Backend
        run: |
          firebase deploy --only functions,firestore,storage,auth \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --token="${{ secrets.FIREBASE_DEPLOY_TOKEN }}"