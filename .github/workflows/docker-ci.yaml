            #       TAG=${GITHUB_SHA}

            - name: Check secret availability
              run: echo "Secrets are loaded"
              env:
                TEST_SECRET: ${{ secrets.DOCKER_PASSWORD }}

                  docker build -t $IMAGE_NAME:$TAG .
